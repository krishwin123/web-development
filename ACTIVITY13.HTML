<!DOCTYPE html>
<html>
    <head>
        <title>My Animal Fact File</title>
        <style>

            /*Page background - sets color and font for whole page*/
            body {
               background-color: darkgreen;
               font-family: Arial, Helvetica, sans-serif; 
            }

            /*Box Model - width sets the content area
            padding pushes the text away from the edges
            border draws a visible frame around the fact file
            margin pushes the fact file away from the screen edge*/
            .fact-file {
                background-color: lightyellow;
                color: green;
                width: 260px;
                padding: 25px;
                border:4px solid forestgreen;
                margin: 30px;
            }

            /*animal name - forestgreen so it stands out*/
            .animal-name {
              color: forestgreen; 
              font-size: 22px; 
            }

            /*Detail rows - dark text on the ligth background*/
            .detail {
                color: darkorange;
            }

            /* Cool fact - orange and italic to make it feel special*/
            .cool-fact {
                color: lightskyblue;
                font-style: italic;
            }

        </style>
    </head> 
    <body>

        <div class="fact-file">
        <h2 class="animal-name">Snow leopard</h2>
        <p class="detail">Type of Bid cat</p>
        <p class="detail">lives in: Mountain ranges of Central Asia</p>
        <p class="detail">Diet=deer,goats,and wild sheep</p>
        <p class="cool-fact">cool-fact:can leap up 15 meters in one jump</p>
        </div>

    </body>
</html>
