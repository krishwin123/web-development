<DOCTYPE'html>
<html>
    <head>
        <title>My Superhero Card</title>
        <style>

            /*Typography-font,size,weigth,color for the whole page*/
            body {
                background-color: blue;
                color: azure;
                font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            }

           /*Typography + text shadow-bid bold title with an orange shadow*/
           .hero-name {
            font-size: 60px;
            font-weight: bold;
            color: aquamarine;
            text-shadow: 3px 3px orange;
           }  

            /*Typography + text transform-tagline becomes Title Case*/
            .tagline {
                font-style: italic;
                color: aqua;
                text-transform: capitalize;
            }

             /*Typography + text Docaration-section headings in CAPS with underline*/
             .label {
                text-transform: uppercase;
                text-decoration: underline;
                color: aliceblue;
             }

             /*Typography + power stand out in bold green*/
             .power {
                font-weight: bold;
                color: limegreen;
             }

             /* text Docaration-weakness are crossed out*/
             .weakness {
                text-decoration: line-through;
                color: darkslategrey;
             }

             /*transform-the badge is tilted to the side*/
             .badge {
                font-size: 28px;
                font-weight: bold;
                color: turquoise;
             }

               /*Typography + footer text*/
             .made-by {
                color: deeppink;
                font-style: italic;
             }
             
        </style>
    </head>
    <body>

        <h1 class="hero-name">Tunder Kid</h1>
        <p class="tagline">The most powerfull hero in the school</p>

         <h2 class="label">Super powers</h2>
        <p class="power">can run faster than a cheetah</p>
        <p class="power">can lift a school bus</p>

         <h2 class="weakness">English test</h2>
        <p class="weakness">broccoli</p>
         
        <p class="badge">Top Hero</p>

        <p class="made-by">created by krishwin </p>
        
    </body>
</html>
