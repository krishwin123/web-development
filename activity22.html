<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Science Lab</title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
        <style>
            body {background-color: #fafff4;font-family: 'Courier New', Courier, monospace;}
            .jambotron {background-color: #e6f9ec;border-left: 6px solid #FF5A43}
            .jambotron {color: #FF5A43;}
            .section-title {color: #FF5A43; margin-top: 30px;margin-bottom: 15px;}
            </style>
    </head>
    <body>
    
        <!-- TOPIC 1: JUMBOTORN -->
        <div class="jumbotron jumbotron-fluid">
         <div class="container">
         <h1>My Science Lab</h1>
         <p class="lead">Welcome to the lab!</p>
         <!-- Four Bootstrap buttons — one for each subject -->
         <button class="btn btn-primary">Chemistry</button>
         <button class="btn btn-success">Biology</button>
         <button class="btn btn-warning">Physics</button>
          <button class="btn btn-danger">Astronomy</button>
        </div>
        </div>

        <div class="container"></div>

            <!-- TOPIC 3:BADGES -->
             <h2 class="section-title">Experimants completed <span class="badge badge-danger"</h2>
             <!-- Badge attached to a subject name -->
<p>Chemistry<span class="badge badge-primary">7 experiments</span></p>
<p>Biology<span class="badge badge-success">5 experiments</span></p>
<p>Physics<span class="badge badge-warning">3 experiments</span></p>
<h2>Astronomy <span class="badge badge-danger">4</span></h2>

          <!--TOPIC 3: PROGRESS BARS-->
          <h2 class="section-title">Research progress</h2>
          <p>Chemistry</p>
          <div class="progress mb-3">
            <div class="progress-bar bg-primary" style="width: 85%;">85%</div>
          </div>
           <p>Biology</p>
          <div class="progress mb-3">
            <div class="progress-bar bg-succes" style="width: 70%;">70%</div>
          </div>
           <p>Physics</p>
          <div class="progress mb-3">
            <div class="progress-bar bg-warning" style="width: 55%;">55%</div>
          </div>
           <p>Astronomy</p>
          <div class="progress mb-3">
            <div class="progress-bar bg-danger" style="width: 40%;">40%</div>
          </div>
    </body>
</html>
